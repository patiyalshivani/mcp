<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shivani Technical SEO Audit MCP Server</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2933;
        --muted: #56616d;
        --line: #d9cfc0;
        --accent: #0f766e;
        --accent-dark: #134e4a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 34rem),
          linear-gradient(135deg, #f7f3ec 0%, #eef5f2 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        padding: clamp(32px, 8vw, 72px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.9);
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.12);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 24px;
        color: var(--accent-dark);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(15, 118, 110, 0.14);
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(40px, 7vw, 76px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(16px, 2vw, 20px);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: #ffffff;
        background: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      a.secondary {
        color: var(--accent-dark);
        background: transparent;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Server online</div>
      <h1>Welcome to Shivani Technical SEO Audit MCP Server</h1>
      <p>This server is focused on technical SEO audits only. MCP clients can run a URL-level audit through the secure endpoint, while health checks remain available separately.</p>
      <div class="actions">
        <a href="/health">Health Check</a>
        <a class="secondary" href="/mcp">MCP Endpoint</a>
      </div>
    </main>
  </body>
</html>
